function chargerFlux(blog, recherche) {

    return new Promise((resolve, reject) => {

        const callback =
           "callbackFlux" + Date.now() + Math.random().toString(36).substring(2);
        
        const script =
            document.createElement("script");

        const url =
        blog.url +
        "/feeds/posts/default" +
        "?alt=json-in-script" +
        "&max-results=500" +
        "&callback=" + callback;


        window[callback] = function(data) {

            delete window[callback];
            script.remove();

            resolve(data);

        };


        script.onerror = function() {

            delete window[callback];
            script.remove();

            reject(
                new Error("Impossible de charger le flux")
            );

        };


        script.src = url;

        document.body.appendChild(script);

    });
}


function normaliser(texte) {
    return texte
        .toLowerCase()
        .normalize("NFD")
        .replace(/[\u0300-\u036f]/g, "")
        .replace(/[^a-z0-9]/g, "")
        .trim();
}
async function chercher() {

    const film =
        document
        .getElementById("recherche")
        .value
        .trim();


    if (!film) {
        alert("Entre un titre de film");
        return;
    }


    const status =
        document.getElementById("status");


    const resultats =
        document.getElementById("resultats");


    resultats.innerHTML = "";


    let html = "";


    status.innerHTML = "Recherche en cours...";

const rechercheNorm = normaliser(film);

const promesses = blogs.map(blog => chargerFlux(blog, film));

const reponses = await Promise.allSettled(promesses);

for (let i = 0; i < reponses.length; i++) {

    const blog = blogs[i];
    const resultat = reponses[i];

    if (resultat.status === "fulfilled") {

        const data = resultat.value;

        const articles = data.feed.entry || [];

        

        let trouve = false;

        for (const article of articles) {

            const titre = article.title.$t;

            if (!normaliser(titre).includes(rechercheNorm))
            continue;

            trouve = true;

            const lien = article.link.find(
                l => l.rel === "alternate"
            );

            html += `
            <div class="resultat">

                <div class="blog">
                ${blog.nom}
                </div>

                ${titre}<br>

                <a href="${lien.href}" target="_blank">
                Ouvrir l'article
                </a>

            </div>
            `;
        }

        if (!trouve) {

            html += `
            <div class="resultat">
            ${blog.nom} :
            aucun titre trouvé
            (${articles.length} articles lus)
            </div>
            `;
        }

    } else {

        html += `
        <div class="resultat">

            <div class="blog">
            ${blog.nom}
            </div>

            Erreur :
            ${resultat.reason.message}

        </div>
        `;
    }
}


    status.innerHTML =
        "Terminé";


    resultats.innerHTML =
        html ||
        "Aucun résultat";

}
