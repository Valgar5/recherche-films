<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Recherche films - Indianagggilles</title>
<style>
body {
    font-family: Arial, sans-serif;
    max-width: 900px;
    margin: 40px auto;
    background: #111;
    color: #eee;
}

h1 {
    color: #f5c542;
}

input {
    width: 70%;
    padding: 12px;
    font-size: 18px;
}

button {
    padding: 12px 18px;
    font-size: 18px;
    cursor: pointer;
}

.resultat {
    margin-top: 20px;
    padding: 15px;
    background: #222;
    border-radius: 8px;
}

.blog {
    color: #f5c542;
    font-weight: bold;
}

a {
    color: #7ec8ff;
}
</style>
</head>

<body>

<h1>Recherche films - Indianaggilles</h1>

<input id="recherche" placeholder="Titre du film">
<button onclick="chercher()">Rechercher</button>

<div id="status"></div>
<div id="resultats"></div>


<script>

const blogs = [
    {
        nom: "Indianagilles",
        url: "https://indianagilles.blogspot.com"
    },
    {
        nom: "Warning Zone",
        url: "https://stalkerjany.blogspot.com"
    },
    {
        nom: "La Cinémathèque du Bis",
        url: "https://lacinemathequedubis.blogspot.com"
    }
];


async function chargerFlux(blog) {

    const flux =
        blog.url +
        "/feeds/posts/default?alt=json&max-results=50";

    const essais = [
        flux,
        "https://api.allorigins.win/raw?url=" +
        encodeURIComponent(flux)
    ];

    let derniereErreur = "";

    for (const adresse of essais) {

        try {

            const reponse = await fetch(adresse, {
                cache: "no-store"
            });

            if (!reponse.ok) {
                throw new Error("HTTP " + reponse.status);
            }

            const texte = await reponse.text();

            return JSON.parse(texte);

        } catch(e) {

            derniereErreur = e.message;

        }
    }

    throw new Error(derniereErreur);
}


function normaliser(texte) {
    return texte
        .toLowerCase()
        .normalize("NFD")
        .replace(/[\u0300-\u036f]/g, "")
        .replace(/['’]/g, "")
        .trim();
}

async function chercher() {

    const film =
        document
        .getElementById("recherche")
        .value
        .trim();


    if (!film) {
        alert("Entre un titre de film");
        return;
    }


    const status =
        document.getElementById("status");


    const resultats =
        document.getElementById("resultats");


    resultats.innerHTML = "";


    let html = "";


    let compteur = 0;


    for (const blog of blogs) {

        compteur++;


        status.innerHTML =
            "Analyse " +
            compteur +
            "/" +
            blogs.length +
            " : " +
            blog.nom;


        try {


            const data =
                await chargerFlux(blog);
                console.log("Flux chargé :", blog.nom, data);


            const articles =
                data.feed.entry || [];


            let trouve = false;


            for (const article of articles) {


                const titre =
                    article.title.$t;


                const titreNormalise = normaliser(titre);
                const rechercheNormalisee = normaliser(film);

                if (titreNormalise.includes(rechercheNormalisee))
                {


                    trouve = true;


                    const lien =
                        article.link.find(
                            l =>
                            l.rel === "alternate"
                        );


                    html += `
                    <div class="resultat">

                    <div class="blog">
                    ${blog.nom}
                    </div>

                    ${titre}<br>

                    <a href="${lien.href}" target="_blank">
                    Ouvrir l'article
                    </a>

                    </div>
                    `;

                }

            }


            if (!trouve) {

                html += `
                <div class="resultat">
                ${blog.nom} :
                aucun titre trouvé
                (${articles.length} articles lus)
                </div>
                `;

            }


        } catch(e) {


            html += `
            <div class="resultat">

            <div class="blog">
            ${blog.nom}
            </div>

            Erreur :
            ${e.message}

            </div>
            `;

        }

    }


    status.innerHTML =
        "Terminé";


    resultats.innerHTML =
        html ||
        "Aucun résultat";

}

</script>

</body>
</html>
