<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Recherche films</title>
<style>
body {
    font-family: Arial, sans-serif;
    max-width: 900px;
    margin: 40px auto;
    background: #111;
    color: #eee;
}

h1 {
    color: #f5c542;
}

input {
    width: 70%;
    padding: 12px;
    font-size: 18px;
}

button {
    padding: 12px 18px;
    font-size: 18px;
    cursor: pointer;
}

.resultat {
    margin-top: 20px;
    padding: 15px;
    background: #222;
    border-radius: 8px;
}

.blog {
    color: #f5c542;
    font-weight: bold;
}

a {
    color: #7ec8ff;
}
</style>
</head>

<body>

<h1>Recherche films</h1>

<input id="recherche" placeholder="Titre du film">
<button onclick="chercher()">Rechercher</button>

<div id="status"></div>
<div id="resultats"></div>


<script>

const blogs = [
    {
        nom: "Indianagilles",
        url: "https://indianagilles.blogspot.com"
    }
];



async function chercher() {

    const terme =
        document
        .getElementById("recherche")
        .value
        .trim();


    if(!terme){
        return;
    }


    const resultats =
        document.getElementById("resultats");


    const status =
        document.getElementById("status");


    resultats.innerHTML = "";
    status.innerHTML = "Recherche en cours...";


    let html = "";


    for(const blog of blogs){


        const articles =
            await rechercherBlog(blog, terme);



        html += `
        <div class="resultat">

            <div class="blog">
            ${blog.nom}
            </div>

            ${articles.length} résultat(s)

        </div>
        `;



        articles.forEach(article=>{


            html += `

            <div class="resultat">

                <div class="blog">
                ${blog.nom}
                </div>


                <a href="${article.url}" target="_blank">
                ${article.titre}
                </a>


                <br><br>

                ${article.resume || ""}


            </div>

            `;


        });


    }



    status.innerHTML="Terminé";


    resultats.innerHTML =
        html || "Aucun résultat";

}





async function rechercherBlog(blog, terme){


    const url =
        blog.url +
        "/search?q=" +
        encodeURIComponent(terme);



    const proxy =
        "https://api.allorigins.win/raw?url=" +
        encodeURIComponent(url);



    const response =
        await fetch(proxy);



    const html =
        await response.text();

        console.log("TAILLE HTML :", html.length);
        console.log(html.substring(0,1000));



    const doc =
        new DOMParser()
        .parseFromString(html,"text/html");



    const resultats=[];



    doc.querySelectorAll("a")
    .forEach(a=>{


        const href =
            a.href || "";


        const titre =
            a.innerText.trim();



        /*
          On garde uniquement
          les liens vers des articles Blogger
        */


        if(
            href.includes("indianagilles.blogspot.com")
            &&
            titre.length > 5
        ){

            resultats.push({

                titre:titre,

                url:href,

                resume:""

            });

        }


    });



    /*
       suppression des doublons
    */

    return [
        ...new Map(
            resultats.map(
                r=>[r.url,r]
            )
        ).values()
    ];


}


</script>

</body>
</html>
