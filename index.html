<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Recherche films - Indianagggilles</title>
<style>
body {
    font-family: Arial, sans-serif;
    max-width: 900px;
    margin: 40px auto;
    background: #111;
    color: #eee;
}

h1 {
    color: #f5c542;
}

input {
    width: 70%;
    padding: 12px;
    font-size: 18px;
}

button {
    padding: 12px 18px;
    font-size: 18px;
    cursor: pointer;
}

.resultat {
    margin-top: 20px;
    padding: 15px;
    background: #222;
    border-radius: 8px;
}

.blog {
    color: #f5c542;
    font-weight: bold;
}

a {
    color: #7ec8ff;
}
</style>
</head>

<body>

<h1>Recherche films - Indianaggilles</h1>

<input id="recherche" placeholder="Titre du film">
<button onclick="chercher()">Rechercher</button>

<div id="status"></div>
<div id="resultats"></div>


<script>

const blogs = [
    {
        nom: "Indianagilles",
        url: "https://indianagilles.blogspot.com"
    },
    {
        nom: "Warning Zone",
        url: "https://stalkerjany.blogspot.com"
    },
    {
        nom: "La Cinémathèque du Bis",
        url: "https://lacinemathequedubis.blogspot.com"
    }
];


function chargerFlux(blog, recherche) {

    return new Promise((resolve, reject) => {

        const callback =
            "callbackFlux" + Date.now();

        const script =
            document.createElement("script");

        const url =
            blog.url +
            "/feeds/posts/default" +
            "?q=" + encodeURIComponent(recherche) +
            "&alt=json-in-script" +
            "&max-results=50" +
            "&callback=" + callback;


        window[callback] = function(data) {

            delete window[callback];
            script.remove();

            resolve(data);

        };


        script.onerror = function() {

            delete window[callback];
            script.remove();

            reject(
                new Error("Impossible de charger le flux")
            );

        };


        script.src = url;

        document.body.appendChild(script);

    });
}


function normaliser(texte) {
    return texte
        .toLowerCase()
        .normalize("NFD")
        .replace(/[\u0300-\u036f]/g, "")
        .replace(/['’]/g, "")
        .trim();
}

async function chercher() {

    const film =
        document
        .getElementById("recherche")
        .value
        .trim();


    if (!film) {
        alert("Entre un titre de film");
        return;
    }


    const status =
        document.getElementById("status");


    const resultats =
        document.getElementById("resultats");


    resultats.innerHTML = "";


    let html = "";


    let compteur = 0;


    for (const blog of blogs) {

        compteur++;


        status.innerHTML =
            "Analyse " +
            compteur +
            "/" +
            blogs.length +
            " : " +
            blog.nom;


        try {


           const data =
                await chargerFlux(blog, film);
                console.log("Flux chargé :", blog.nom, data);


            const articles =
                data.feed.entry || [];


            let trouve = false;


            for (const article of articles) {


                const titre = article.title.$t;

                const contenu =
                article.content?.$t || "";

                const texteComplet =
                titre + " " + contenu;

                const texteNormalise =
                normaliser(texteComplet);

                const rechercheNormalisee =
                normaliser(film);

                if (texteNormalise.includes(rechercheNormalisee))
                {


                    trouve = true;


                    const lien =
                        article.link.find(
                            l =>
                            l.rel === "alternate"
                        );


                    html += `
                    <div class="resultat">

                    <div class="blog">
                    ${blog.nom}
                    </div>

                    ${titre}<br>

                    <a href="${lien.href}" target="_blank">
                    Ouvrir l'article
                    </a>

                    </div>
                    `;

                }

            }


            if (!trouve) {

                html += `
                <div class="resultat">
                ${blog.nom} :
                aucun titre trouvé
                (${articles.length} articles lus)
                </div>
                `;

            }


        } catch(e) {


            html += `
            <div class="resultat">

            <div class="blog">
            ${blog.nom}
            </div>

            Erreur :
            ${e.message}

            </div>
            `;

        }

    }


    status.innerHTML =
        "Terminé";


    resultats.innerHTML =
        html ||
        "Aucun résultat";

}

</script>

</body>
</html>
