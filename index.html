function chargerFlux(blog) {

    if (blog.type === "blogger") {
        return rechercherBlogger(blog);
    }

    return Promise.reject(
        new Error("Type désactivé pour le moment")
    );
}



function rechercherBlogger(blog) {

    return new Promise((resolve, reject) => {

        const recherche =
            document
            .getElementById("recherche")
            .value
            .trim();


        const callback =
            "callbackBlogger" +
            Date.now() +
            Math.random().toString(36).substring(2);


        const script = document.createElement("script");


        const url =
            blog.url +
            "/feeds/posts/default" +
            "?alt=json-in-script" +
            "&q=" +
            encodeURIComponent(recherche) +
            "&max-results=50" +
            "&callback=" +
            callback;



        window[callback] = function(data) {

            delete window[callback];
            script.remove();


            resolve({

                feed:{
                    entry:data.feed.entry || []
                }

            });

        };


        script.onerror = function(){

            delete window[callback];
            script.remove();

            reject(
                new Error(
                    "Recherche impossible sur Blogger"
                )
            );

        };


        script.src=url;

        document.body.appendChild(script);

    });

}



function chargerWordpress(blog) {

    return new Promise((resolve, reject) => {

        const callback =
            "callbackWP" + Date.now() + Math.random().toString(36).substring(2);

        const script = document.createElement("script");


        const url =
            blog.url +
            "/wp-json/wp/v2/search" +
            "?search=" +
            encodeURIComponent(document.getElementById("recherche").value) +
            "&per_page=100" +
            "&callback=" + callback;


        window[callback] = function(data) {

            delete window[callback];
            script.remove();


            resolve({
                feed: {
                    entry: data.map(article => ({
                        title: {
                            $t: article.title
                        },
                        link: [
                            {
                                rel: "alternate",
                                href: article.url
                            }
                        ]
                    }))
                }
            });

        };


        script.onerror = function() {

            delete window[callback];
            script.remove();

            reject(
                new Error("Impossible de charger le flux Wordpress")
            );

        };


        script.src = url;

        document.body.appendChild(script);

    });

}

function normaliser(texte) {
    return texte
        .toLowerCase()
        .normalize("NFD")
        .replace(/[\u0300-\u036f]/g, "")
        .replace(/[^a-z0-9]/g, "")
        .trim();
}
async function chercher() {

    const film =
        document
        .getElementById("recherche")
        .value
        .trim();


    if (!film) {
        alert("Entre un titre de film");
        return;
    }


    const status =
        document.getElementById("status");


    const resultats =
        document.getElementById("resultats");


    resultats.innerHTML = "";


    let html = "";


    status.innerHTML = "Recherche en cours...";


    const promesses =
        blogs.map(blog => chargerFlux(blog));


    const reponses =
        await Promise.allSettled(promesses);



    for (let i = 0; i < reponses.length; i++) {


        const blog = blogs[i];

        const resultat = reponses[i];



        if (resultat.status === "fulfilled") {


            const data = resultat.value;


            const articles =
                data.feed.entry || [];



            console.log(
                blog.nom,
                "résultats Blogger :",
                articles.length
            );



            for (const article of articles) {


                const titre =
                    article.title.$t || "";



                const lien =
                    article.link.find(
                        l => l.rel === "alternate"
                    );



                if (!lien) {
                    continue;
                }



                html += `
                <div class="resultat">

                    <div class="blog">
                    ${blog.nom}
                    </div>

                    ${titre}<br>

                    <a href="${lien.href}" target="_blank">
                    Ouvrir l'article
                    </a>

                </div>
                `;


            }



            if (articles.length === 0) {


                html += `
                <div class="resultat">

                    <div class="blog">
                    ${blog.nom}
                    </div>

                    Aucun résultat

                </div>
                `;

            }



        } else {



            html += `
            <div class="resultat">

                <div class="blog">
                ${blog.nom}
                </div>

                Erreur :
                ${resultat.reason.message}

            </div>
            `;


        }


    }



    status.innerHTML =
        "Terminé";



    resultats.innerHTML =
        html ||
        "Aucun résultat";


}
