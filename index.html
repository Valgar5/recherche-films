<!DOCTYPE html>
<html lang="fr">

<head>
<meta charset="UTF-8">
<title>Moteur films Blogger</title>

<style>

body {
    font-family: Arial, sans-serif;
    max-width:900px;
    margin:40px auto;
    background:#111;
    color:#eee;
}

h1 {
    color:#f5c542;
}

input {
    width:70%;
    padding:12px;
    font-size:18px;
}

button {
    padding:12px 18px;
    font-size:18px;
    cursor:pointer;
}

.resultat {

    margin-top:20px;
    padding:15px;
    background:#222;
    border-radius:8px;

}

.blog {

    color:#f5c542;
    font-weight:bold;

}

a {
    color:#7ec8ff;
}


</style>

</head>


<body>


<h1>Recherche films</h1>


<input id="recherche" placeholder="Titre du film">

<button onclick="chercher()">
Rechercher
</button>


<div id="status"></div>

<div id="resultats"></div>



<script>


const blogs=[

{
nom:"Indianagilles",
url:"https://indianagilles.blogspot.com"
}

];





function chargerFlux(blog,start){


return new Promise((resolve,reject)=>{


const callback =

"bloggerCallback" +
Date.now() +
Math.random().toString(36).substring(2);



window[callback]=function(data){


delete window[callback];


const articles =
data.feed.entry || [];



resolve({

articles:articles,

total:
Number(
data.feed.openSearch$totalResults.$t
)

});


};



const script=document.createElement("script");



script.onerror=function(){

delete window[callback];

reject(
new Error("Erreur chargement Blogger")
);

};



script.src=

blog.url +

"/feeds/posts/default" +

"?alt=json-in-script" +

"&max-results=500" +

"&start-index=" +

start +

"&callback=" +

callback;



document.body.appendChild(script);



});


}







async function chargerTout(blog){


let tous=[];

let index=1;

let total=999999;



while(index <= total){


const page =
await chargerFlux(blog,index);



tous =
tous.concat(page.articles);



total =
page.total;



index += page.articles.length;



console.log(
blog.nom,
tous.length,
"/",
total
);



if(page.articles.length===0){
break;
}



}



return tous;



}








function nettoyer(t){

return t

.toLowerCase()

.normalize("NFD")

.replace(/[\u0300-\u036f]/g,"");


}







async function chercher(){



const terme =

document
.getElementById("recherche")
.value
.trim();



if(!terme){
return;
}



const status =
document.getElementById("status");


const resultat =
document.getElementById("resultats");



status.innerHTML="Chargement du blog...";

resultat.innerHTML="";



let html="";



for(const blog of blogs){



const articles =

await chargerTout(blog);



status.innerHTML =
articles.length +
" articles chargés";



const mot =
nettoyer(terme);



const trouves =

articles.filter(article=>{


let texte="";



texte +=
article.title?.$t || "";



texte +=
article.summary?.$t || "";



texte +=
article.content?.$t || "";



if(article.category){


texte +=

article.category

.map(c=>c.term)

.join(" ");


}



return

nettoyer(texte)
.includes(mot);



});




html += `

<div class="resultat">

<div class="blog">

${blog.nom}

</div>


${trouves.length} résultat(s)

</div>


`;





trouves.forEach(article=>{



let lien="";



article.link.forEach(l=>{

if(l.rel==="alternate"){

lien=l.href;

}

});




html += `


<div class="resultat">


<div class="blog">

${blog.nom}

</div>


<a href="${lien}" target="_blank">

${article.title.$t}

</a>


</div>


`;



});



}



status.innerHTML="Terminé";


resultat.innerHTML =

html ||

"Aucun résultat";



}



</script>


</body>

</html>
